name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get your code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 23.11.0

      # 3️⃣ Install dependencies from package.json
      - name: Install dependencies
        run: npm install

      # 4️⃣ Install Playwright browsers (Chromium, Firefox, WebKit)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run all Playwright tests for all projects (Chromium, Firefox, WebKit)
      #     --reporter=list: console output
      #     --reporter=html: generates an HTML report
      - name: Run Playwright Tests
        run: npx playwright test ./tests --reporter=list,html

      # 6️⃣ Upload the HTML report as an artifact so you can download it from GitHub
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
